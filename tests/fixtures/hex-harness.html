<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vd-hex test harness</title>
    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f5f5f5;
        --border-color: #e0e0e0;
        --color-primary: #3b82f6;
        --text-primary: #1f2937;
        --text-muted: #6b7280;
      }

      body {
        margin: 0;
        font-family: sans-serif;
      }

      #mount {
        width: 960px;
        height: 640px;
      }

      canvas {
        width: 960px;
        height: 640px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="mount">
      <canvas id="hex-canvas"></canvas>
    </div>

    <script type="module">
      import { VdHexGrid } from '/hex-grid.js';
      import * as hexMath from '/utils/hex-math.js';

      window.hexMath = hexMath;
      window.lastEvent = null;

      window.createGrid = (options = {}) => {
        const element = document.getElementById('mount');
        const canvas = document.getElementById('hex-canvas');
        const grid = new VdHexGrid({
          element,
          canvas,
          size: 30,
          width: 10,
          height: 10,
          rotation: 0,
          ...options,
        });

        grid.on('select', (data) => {
          window.lastEvent = { type: 'select', data };
        });
        grid.on('zoom', (data) => {
          window.lastEvent = { type: 'zoom', data };
        });
        grid.on('pan', (data) => {
          window.lastEvent = { type: 'pan', data };
        });

        window.grid = grid;
        return grid;
      };

      window.resetGrid = (options = {}) => {
        return window.createGrid(options);
      };
    </script>
  </body>
</html>
